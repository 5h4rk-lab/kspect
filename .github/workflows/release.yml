name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: false

      - name: Run tests
        run: go test ./...

      - name: Build release binaries
        run: VERSION=${GITHUB_REF_NAME} make release-snapshot

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/kspect_*
            dist/SHA256SUMS
          generate_release_notes: true

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      # Multi-arch image so arm64 container hosts get a native binary,
      # matching the arm64 release binary above.
      - name: Build and push image
        run: |
          IMAGE=ghcr.io/${{ github.repository }}
          docker buildx build --platform linux/amd64,linux/arm64 \
            --build-arg VERSION=${GITHUB_REF_NAME} \
            -t $IMAGE:${GITHUB_REF_NAME} -t $IMAGE:latest --push .
